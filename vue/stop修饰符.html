<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.9/vue.js"></script>
<body>
   <div :style='styleObj'  id="app">
       <div @click="fn1">
         <!--阻止冒泡-->
         <!--<button @click.prevent="fn2">按钮</button>-->
         <!--点击链接-->
         <a @click.prevent.stop="fn2" href="https://kaiwu.lagou.com">链接</a>
       </div>
   </div>
</body>
   <script>
       new Vue({
         el:'#app',
         data:{
             styleObj:{
               width:'100px',
               height:'100px',
               border:'1px solid #ccc'
             }
         },
         methods:{
           fn1(){
             console.log('div的点击事件');
           },
           fn2(){
             console.log('a的点击事件');
           }
         }
       })
   </script>
</html>
