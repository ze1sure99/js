<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>子向父传值需要通过自定义事件实现</title>
</head>
<script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.9/vue.js"></script>
<body>
<div id="app">
    <h3>购物车</h3>
    <product-item
            v-for="product in products"
            :key="product.id"
            :title="product.title"
            @count-change="totalCount += $event "
    >
    </product-item>
    <p>商品总个数为:{{totalCount}}</p>
</div>
</body>
<script>
    //子组件
    Vue.component('ProductItem',{
        props:['title'],
        template:`
          <div>
             <span>商品名称:{{title}},商品个数:{{count}}</span>
             <button @click="countIns1">+1</button>
             <button @click="countIns5">+5</button>
          </div>
        `,
        data(){
            return{
                count:0
            }
        },
        methods:{
            countIns1(){
                //触发count-change事件
                this.$emit('count-change',1);
                this.count++;
            },
            countIns5(){
               this.$emit('count-change',5);
                this.count+=5;
            }
        }
    })
    new Vue({
        el:'#app',
        data:{
            products:[
                {
                    id:1,
                    title:'苹果一斤'
                },
                {
                    id:2,
                    title: '香蕉一根'
                },
                {
                    id:3,
                    title: '橙子一个'
                }
            ],
            totalCount: 0
        }
    })
</script>
</html>
