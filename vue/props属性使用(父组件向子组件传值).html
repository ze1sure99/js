<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.9/vue.js"></script>
<body>
    <!--父组件向子组件传递信息-->
    <div id="app">
                <!--props静态属性设置-->
                <my-component-a
                 :title="'这是静态的标题'"
                 :content="'这是静态的内容'"
                 ></my-component-a>
                <!--props动态属性绑定-->
                <my-component-a
                 :title="item.title"
                 :content="item.content"
                >

                </my-component-a>

    </div>
</body>
<script>
   //创建子组件
   Vue.component('my-component-a',{
       //通过props接收父组件传过来的数据
       props:['title','content'],
       template:`
        <di>
          <h3>{{title}}</h3>
          <p>{{content}}</p>
        </di>
       `
   })

   new Vue({
       el:'#app',
       data:{
           item:{
               title:'这是示例标题',
               content:'这是示例内容'
           }
       }
   })
</script>
</html>
