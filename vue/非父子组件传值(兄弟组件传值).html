<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>非父子组件传值(兄弟组件传值)</title>
</head>
<script src="https://cdn.bootcdn.net/ajax/libs/vue/2.6.9/vue.js"></script>
<body>
    <div id="app">
        <!--父组件接收子组件A的数据-->
        <!--value=$event  value指的是父组件内的value $envent是子组件a传给父组件的value-->
        <com-a
                @value-change="value = $event"
        >
        </com-a>
        <!--父组件将数据接收给子组件B-->
        <com-b
                :value1="value"
        ></com-b>
    </div>
</body>
<script>
  //子组件A:发送数据
  Vue.component('ComA',{
    template:`
    <div>
      组件A的内容：{{value}}
      <button
      @click="$emit('value-change',value)"
      >发送</button>
    </div>
    `,
      data() {
        return {
            value: '这是组件A中的数据'
        }
      }
  })
  //子组件B:接收数据
  Vue.component('ComB',{
      props:['value1'],
      template: `
      <div>
        组件B接收到:{{value1}}
      </div>
      `
  })
   //根实例（父组件）
   new Vue({
     el:'#app',
     data:{
       //用于数据中转
       value:''
     }
   })
</script>
</html>
